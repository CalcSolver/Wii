<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OctoArcade — Vertical Stream</title>
  <style>
    :root {
      --bg-dark: #05070a;
      --card-bg: #0d1117;
      --border-accent: #30363d;
      --accent-green: #238636;
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
    }
    * { box-sizing: border-box; }
    html, body { 
      margin: 0; padding: 0; height: 100%; 
      background-color: var(--bg-dark); 
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Fixed Minimal Top Navigation bar */
    .feed-header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-accent);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 1000;
    }
    .feed-header a {
      color: var(--text-main); text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 8px; font-size: 0.95rem;
    }
    .feed-header .exit-btn {
      background: var(--accent-green); padding: 6px 14px; border-radius: 6px;
    }

    /* Container holding the single vertical column stream */
    .stream-container {
      max-width: 680px; margin: 80px auto 40px auto;
      padding: 0 16px; display: flex; flex-direction: column; gap: 40px;
    }

    /* Big Vertical Feed Post Blocks */
    .feed-post {
      background: var(--card-bg); border: 1px solid var(--border-accent);
      border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5); transition: border-color 0.3s, transform 0.3s;
      scroll-margin-top: 80px; /* Snapping spacing offset */
    }
    .feed-post.active-focus {
      border-color: var(--accent-green);
      transform: scale(1.01);
    }

    /* Interactive Game Canvas Frame Window wrapper */
    .media-window {
      width: 100%; aspect-ratio: 16/9; background: #000;
      position: relative; border-bottom: 1px solid var(--border-accent);
    }
    .media-window iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* Text details layout stack inside the feed post block */
    .post-details { padding: 24px; display: flex; flex-direction: column; gap: 10px; }
    .post-tag {
      font-size: 0.75rem; font-weight: 700; color: var(--accent-green);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .post-title { font-size: 1.6rem; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
    .post-desc { font-size: 1rem; color: var(--text-muted); line-height: 1.5; margin: 0; }

    /* Controls block section inside each block */
    .post-actions {
      margin-top: 8px; display: flex; justify-content: space-between; align-items: center;
    }
    .play-trigger-btn {
      background: #21262d; border: 1px solid var(--border-accent); color: var(--text-main);
      padding: 10px 20px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .play-trigger-btn:hover { background: var(--accent-green); border-color: transparent; }
    .fullscreen-post-btn {
      background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem;
    }
    .fullscreen-post-btn:hover { color: var(--text-main); }

    /* Global shortcut hint overlay box */
    .keyboard-hint {
      position: fixed; bottom: 20px; right: 20px; background: rgba(13,17,23,0.9);
      border: 1px solid var(--border-accent); padding: 8px 14px; border-radius: 20px;
      font-size: 0.8rem; color: var(--text-muted); pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>

  <header class="feed-header">
    <a href="index.html">🐙 <span>OctoArcade Stream</span></a>
    <a href="index.html" class="exit-btn">Close Feed</a>
  </header>

  <main class="stream-container" id="streamContainer">
    </main>

  <div class="keyboard-hint">Use <b>↑</b> and <b>↓</b> Arrow Keys to change posts</div>

  <script>
    const OWNER = 'CalcSolver';
    const REPO = 'Wii';
    const BRANCH = 'main';

    const RAW_BASE = `https://raw.githack.com/${OWNER}/${REPO}/${BRANCH}`;
    const ICON_BASE = `${RAW_BASE}/Icon`;

    let feedItems = [];
    let focusedIndex = 0;

    const streamContainer = document.getElementById('streamContainer');

    function inferCategory(name) {
      const n = name.toLowerCase();
      if (/bloxorz|amongus|attackhole|adocar|gunspin|slope|pacman|1942|cloudmoon/.test(n)) return "Arcade System";
      if (/backrooms|fnaf|granny/.test(n)) return "Horror Vault";
      return "Classic Emulator";
    }

    function createDescription(title, category) {
      return `Now streaming live component from repository node: Experience full gameplay optimization on ${title}. Dispatched directly from the server onto an instant structural frame view.`;
    }

    async function loadStream() {
      streamContainer.innerHTML = '<div style="text-align:center; padding:100px 0; color:var(--text-muted)">Connecting to stream instance...</div>';
      
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/`, { cache: 'no-store' });
        const data = await res.json();

        feedItems = data
          .filter(file => file.type === 'file' && /\.html?$/i.test(file.name))
          .map(file => {
            const parsedTitle = file.name.replace(/\.html?$/i, '').replace(/[-_]/g, ' ').replace(/\b\w/g, char => char.toUpperCase());
            const cat = inferCategory(file.name);
            return {
              title: parsedTitle,
              filename: file.name,
              category: cat,
              description: createDescription(parsedTitle, cat)
            };
          });
      } catch (err) {
        console.error(err);
      }

      if (feedItems.length === 0) {
        feedItems = [{ title: "Gun Spin", filename: "gunspin.html", category: "Arcade System", description: "Weaponized flight dynamic emulation engine modules." }];
      }

      streamContainer.innerHTML = '';
      renderStreamBlocks();
    }

    function renderStreamBlocks() {
      feedItems.forEach((item, index) => {
        const post = document.createElement('div');
        post.className = `feed-post ${index === 0 ? 'active-focus' : ''}`;
        post.id = `post-${index}`;
        
        post.innerHTML = `
          <div class="media-window">
            <iframe id="iframe-${index}" data-src="${RAW_BASE}/${item.filename}" allowfullscreen src="${index === 0 ? RAW_BASE + '/' + item.filename : ''}"></iframe>
          </div>
          <div class="post-details">
            <span class="post-tag">${item.category}</span>
            <h2 class="post-title">${item.title}</h2>
            <p class="post-desc">${item.description}</p>
            <div class="post-actions">
              <button class="play-trigger-btn" onclick="activateAndScroll(${index})">⚡ Reload Channel</button>
              <button class="fullscreen-post-btn" onclick="triggerPostFullscreen(${index})">⛶ Fullscreen view</button>
            </div>
          </div>
        `;
        
        streamContainer.appendChild(post);
      });
    }

    function syncFocusedPost(index) {
      if (index < 0 || index >= feedItems.length) return;
      
      // Update visual border highlights
      document.querySelectorAll('.feed-post').forEach(el => el.classList.remove('active-focus'));
      const activePost = document.getElementById(`post-${index}`);
      if (activePost) activePost.classList.add('active-focus');

      focusedIndex = index;

      // Lazy load current frame src, drop past frame src context to avoid audio overlay bugs
      feedItems.forEach((item, idx) => {
        const frame = document.getElementById(`iframe-${idx}`);
        if (frame) {
          if (idx === index) {
            if (!frame.src) frame.src = frame.getAttribute('data-src');
          } else {
            frame.src = ''; // Clear inactive tabs to kill audio crosstalk
          }
        }
      });

      // Smooth scroll viewport onto layout segment block
      activePost.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function activateAndScroll(index) {
      const frame = document.getElementById(`iframe-${index}`);
      if (frame) frame.src = frame.getAttribute('data-src');
      syncFocusedPost(index);
    }

    function triggerPostFullscreen(index) {
      const frame = document.getElementById(`iframe-${index}`);
      if (frame) frame.requestFullscreen().catch(err => console.log(err));
    }

    // Keyboard navigation mappings
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (focusedIndex + 1 < feedItems.length) {
          syncFocusedPost(focusedIndex + 1);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (focusedIndex - 1 >= 0) {
          syncFocusedPost(focusedIndex - 1);
        }
      }
    });

    // Run setup routine
    loadStream();
  </script>
</body>
</html>
