<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Web Arcade | CalcSolver</title>
    <style>
        /* Base Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header Nav Bar */
        header {
            background-color: #1f2833;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #45f3ff;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.4);
        }

        .links-group {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background-color: #0b0c10;
            color: #45f3ff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #45f3ff;
            transition: 0.2s ease;
        }

        .nav-btn:hover {
            background-color: #45f3ff;
            color: #0b0c10;
        }

        /* Main Workspace Container */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
            overflow: hidden;
        }

        /* Main Theater/Preview Box Container */
        .theater-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 3px solid #1f2833;
            overflow: hidden;
        }

        /* Embedded Dynamic Game Frame Frame */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* Fullscreen Overlay Bar */
        .hover-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theater-box:hover .hover-controls {
            opacity: 1;
        }

        .current-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .fs-btn {
            background-color: #45f3ff;
            color: #0b0c10;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .fs-btn:hover {
            transform: scale(1.05);
            background-color: #fff;
        }

        /* Bottom Previews Deck */
        .deck-shelf {
            width: 100%;
            background-color: #1f2833;
            padding: 20px;
            border-top: 2px solid #111;
        }

        .deck-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5c6c7;
            margin-bottom: 12px;
        }

        .deck-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        /* Custom Tray Scrollbars */
        .deck-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .deck-scroll::-webkit-scrollbar-track {
            background: #0b0c10;
        }
        .deck-scroll::-webkit-scrollbar-thumb {
            background: #45f3ff;
            border-radius: 10px;
        }

        /* Game Preview Cards */
        .preview-card {
            flex: 0 0 150px;
            height: 110px;
            background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%);
            border: 2px solid #45f3ff;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: 0.2s ease;
        }

        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(69, 243, 255, 0.3);
        }

        .card-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            font-size: 11px;
            text-align: center;
            padding: 6px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">WII ARCADE</a>
        <div class="links-group">
            <a href="https://vercel.app" target="_blank" class="nav-btn">Live Site</a>
            <a href="https://github.com" target="_blank" class="nav-btn">GitHub Repo</a>
        </div>
    </header>

    <main class="workspace">
        <div class="theater-box" id="mainTheater">
            <!-- Loads Pacman as the safe default game view to prevent infinite recursion loop -->
            <iframe id="viewport" src="pacman.html" allowfullscreen></iframe>
            
            <div class="hover-controls">
                <div class="current-title" id="displayTitle">Pac-Man (Default)</div>
                <button class="fs-btn" onclick="goFullscreen()">GO FULLSCREEN</button>
            </div>
        </div>
    </main>

    <section class="deck-shelf">
        <h2 class="deck-title">Select a Game Preview Below</h2>
        <div class="deck-scroll" id="cardGrid">
            <!-- Grid cards populated dynamically below -->
        </div>
    </section>

    <script>
        // Exact real names of files from your GitHub repository screenshot
        const repositoryGames = [
            { title: "Pacman", file: "pacman.html", emoji: "🕹️" },
            { title: "Call of Duty 4", file: "COD4.html", emoji: "🔫" },
            { title: "1942 Arcade", file: "1942.html", emoji: "🛩️" },
            { title: "Zelda 2", file: "Zelda2.html", emoji: "⚔️" },
            { title: "Zelda: Link to Past", file: "Zeldalinktopast.html", emoji: "🛡️" },
            { title: "Mortal Kombat", file: "mortalkombat.html", emoji: "🥋" },
            { title: "Pokemon Emerald", file: "pokemonemerald.html", emoji: "🐉" },
            { title: "Smash Bros", file: "smashbros.html", emoji: "💥" },
            { title: "Street Fighter 2", file: "streetfighter2.html", emoji: "🥊" },
            { title: "Super Mario World 2", file: "supermarioworld2.html", emoji: "🍄" },
            { title: "Tennis", file: "tennis.html", emoji: "🎾" },
            { title: "Tony Hawk 2", file: "tonyhawk2.html", emoji: "🛹" },
            { title: "Winter Olympics", file: "winterolympics.html", emoji: "🏂" },
            { title: "Other Stuff", file: "otherstuff.html", emoji: "📦" }
        ];

        const grid = document.getElementById('cardGrid');
        const view = document.getElementById('viewport');
        const titleText = document.getElementById('displayTitle');

        // Build the game selection tray dynamically
        repositoryGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'preview-card';
            card.innerHTML = `
                ${game.emoji}
                <div class="card-name">${game.title}</div>
            `;
            
            // Updates iframe src directly to your root file names
            card.addEventListener('click', () => {
                view.src = game.file;
                titleText.textContent = game.title;
            });
            
            grid.appendChild(card);
        });

        // Fullscreen Mode Execution
        function goFullscreen() {
            const box = document.getElementById('mainTheater');
            if (!document.fullscreenElement) {
                box.requestFullscreen().catch(err => {
                    console.warn(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
