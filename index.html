<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Web Games | CalcSolver</title>
    <style>
        /* Modern Reset and Theme Colors */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header Navigation Bar */
        header {
            background-color: #1a1d2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2e3456;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00d2ff;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .gh-link {
            background-color: #24292e;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s ease;
        }

        .gh-link:hover {
            background-color: #333a42;
        }

        /* Main Workspace Container */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 15px;
            overflow: hidden;
        }

        /* Interactive Theater/Preview Container */
        .preview-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #2e3456;
            overflow: hidden;
        }

        /* Embedded Game Window Frame */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* Fullscreen Option Bar Overlay */
        .controls-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .preview-wrapper:hover .controls-bar {
            opacity: 1;
        }

        .game-title {
            font-size: 18px;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        .fullscreen-btn {
            background-color: #00d2ff;
            color: #0f111a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
        }

        .fullscreen-btn:hover {
            background-color: #00b4dc;
            transform: scale(1.05);
        }

        /* Bottom Row Horizontal Game Carousel Selection */
        .games-tray {
            width: 100%;
            background-color: #1a1d2e;
            padding: 20px;
            border-top: 2px solid #2e3456;
        }

        .tray-heading {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b949e;
            margin-bottom: 12px;
            padding-left: 10px;
        }

        .games-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar Styles for the Games Tray */
        .games-grid::-webkit-scrollbar {
            height: 8px;
        }
        .games-grid::-webkit-scrollbar-track {
            background: #0f111a;
            border-radius: 4px;
        }
        .games-grid::-webkit-scrollbar-thumb {
            background: #2e3456;
            border-radius: 4px;
        }
        .games-grid::-webkit-scrollbar-thumb:hover {
            background: #00d2ff;
        }

        /* Individual Interactive Game Preview Thumbnail Cards */
        .game-card {
            flex: 0 0 160px;
            aspect-ratio: 1;
            background-color: #252942;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00d2ff;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 17, 26, 0.85);
            padding: 6px;
            font-size: 12px;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
