<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Games Feed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .game-feed {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .game-card {
            padding: 30px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .game-card.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-info {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .game-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .game-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button:active:not(:disabled) {
            transform: translateY(0);
        }

        .counter {
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        .counter span {
            color: #667eea;
        }

        .no-games {
            padding: 30px;
            text-align: center;
            color: #999;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .game-card {
                padding: 20px;
            }

            .controls {
                padding: 15px 20px;
            }

            .button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>

        let currentIndex = 0;

        function initializeFeed() {
            const totalCount = document.getElementById('totalCount');
            totalCount.textContent = games.length;
            renderGame();
        }

        function renderGame() {
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';

            if (games.length === 0) {
                container.innerHTML = '<div class="no-games">No games available</div>';
                return;
            }

            const game = games[currentIndex];
            const card = document.createElement('div');
            card.className = 'game-card active';
            card.innerHTML = `
                <div class="game-title">🎮 ${game.name}</div>
                <div class="game-info">
                    <p>Ready to play? Click below to start!</p>
                </div>
                <a href="${game.file}" class="game-link">▶ PLAY NOW</a>
            `;
            container.appendChild(card);

            // Update counter
            document.getElementById('currentIndex').textContent = currentIndex + 1;

            // Update button states
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === games.length - 1;
        }

        function nextGame() {
            if (currentIndex < games.length - 1) {
                currentIndex++;
                renderGame();
            }
        }

        function previousGame() {
            if (currentIndex > 0) {
                currentIndex--;
                renderGame();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') previousGame();
            if (e.key === 'ArrowDown') nextGame();
        });

        // Initialize on page load
        window.addEventListener('load', initializeFeed);
