<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mathspace — Game Theater</title>
  <meta name="description" content="Mathspace gaming theater — modern geometric dark landing page with a curated local game tray." />
  <style>
    /* Root theme variables (dark by default) */
    :root{
      --bg-900: #0d1117; /* page background */
      --bg-800: #161b22;
      --bg-700: #21262d;
      --card: #101318;
      --muted: #8b98a6;
      --accent-1: #00d2ff; /* neon cyan */
      --accent-2: #0066cc; /* teal/blue */
      --glass: rgba(255,255,255,0.03);
      --glass-2: rgba(0,0,0,0.35);
      --text: #e6eef6;
      --radius: 12px;
      --shadow: 0 6px 18px rgba(2,6,23,0.6);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Helvetica Neue", monospace;
      --ui-sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue";
      --transition: 220ms cubic-bezier(.2,.9,.3,1);
    }

    /* Light theme overrides (crisp light profile) */
    html[data-theme="light"]{
      --bg-900: #f7fbff;
      --bg-800: #eef6ff;
      --bg-700: #e6f0fb;
      --card: #ffffff;
      --muted: #556272;
      --accent-1: #0066cc; /* invert emphasis */
      --accent-2: #00d2ff;
      --glass: rgba(6,10,14,0.03);
      --glass-2: rgba(0,0,0,0.05);
      --text: #04101a;
      --shadow: 0 6px 18px rgba(13,17,23,0.06);
    }

    /* Basic reset */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--ui-sans);
      background:linear-gradient(180deg,var(--bg-900) 0%, var(--bg-800) 40%, var(--bg-700) 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      gap:20px;
    }

    /* Header / Nav */
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:20px clamp(18px, 4vw, 48px);
      gap:16px;
      backdrop-filter: blur(6px);
      background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      box-shadow:var(--shadow);
      border-radius:0 0 16px 16px;
      margin:12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      user-select:none;
    }
    .logo{
      width:44px;
      height:44px;
      display:inline-grid;
      place-items:center;
      border-radius:10px;
      background:linear-gradient(135deg,var(--accent-1), var(--accent-2));
      box-shadow:0 4px 14px rgba(0,0,0,0.35), inset 0 -6px 16px rgba(255,255,255,0.02);
      font-family:var(--mono);
      color:#04101a;
      font-weight:700;
      letter-spacing:-0.02em;
    }
    .brand h1{
      margin:0;
      font-size:1.05rem;
      line-height:1;
      letter-spacing:0.02em;
    }
    .brand p{
      margin:0;
      color:var(--muted);
      font-size:0.82rem;
      margin-top:2px;
    }

    /* Theme toggle block */
    .controls{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .theme-toggle{
      display:inline-flex;
      align-items:center;
      gap:12px;
      background:var(--glass);
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.03);
      transition:background var(--transition);
    }
    .theme-toggle .label{
      font-size:0.82rem;
      color:var(--muted);
    }
    /* switch */
    .switch{
      --size:42px;
      width:var(--size);
      height:24px;
      background:linear-gradient(90deg, rgba(255,255,255,0.03), rgba(0,0,0,0.06));
      border-radius:999px;
      position:relative;
      padding:3px;
      display:inline-block;
      cursor:pointer;
      transition:all var(--transition);
      border:1px solid rgba(255,255,255,0.04);
    }
    .switch input{display:none}
    .switch .knob{
      position:absolute;
      top:3px;
      left:3px;
      width:18px;
      height:18px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent-1), var(--accent-2));
      box-shadow:0 4px 10px rgba(0,0,0,0.35);
      transition:transform var(--transition), left var(--transition);
    }
    html[data-theme="light"] .switch .knob{
      transform:translateX(18px);
      background:linear-gradient(135deg,var(--accent-2), var(--accent-1));
    }

    /* Page main layout */
    main{
      display:flex;
      align-items:center;
      justify-content:center;
      flex:1 1 auto;
      padding:20px;
      gap:20px;
    }

    /* Theater container */
    .theater-wrap{
      width:min(1200px, 94vw);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      margin:0 auto;
    }
    .theater{
      width:100%;
      aspect-ratio:16/9;
      max-height:70vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06)),
        radial-gradient(1200px 400px at 10% 30%, rgba(0,210,255,0.04), transparent 10%),
        var(--card);
      border-radius:calc(var(--radius) + 6px);
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:grid;
      place-items:center;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .theater:focus{outline:3px solid rgba(0,210,255,0.06)}
    .theater .screen{
      width:100%;
      height:100%;
      display:block;
      position:relative;
    }

    /* iframe style */
    .theater iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
      transform-origin:center;
    }

    /* hover overlay controls (bottom anchored) */
    .overlay{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:12px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      transform:translateY(110%);
      opacity:0;
      transition:transform 260ms cubic-bezier(.2,.9,.3,1), opacity 220ms;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(2,6,23,0.0), rgba(2,6,23,0.48));
      backdrop-filter: blur(6px);
    }
    .theater:hover .overlay,
    .overlay.show{
      transform:translateY(0%);
      opacity:1;
      pointer-events:auto;
    }
    .game-title{
      display:flex;
      gap:12px;
      align-items:center;
      font-weight:600;
    }
    .game-title .title-text{
      font-size:1.05rem;
      letter-spacing:0.01em;
    }
    .game-title .subtitle{
      font-size:0.78rem;
      color:var(--muted);
      margin-left:6px;
      font-weight:500;
    }

    .btn-fullscreen{
      --pad:12px 14px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:var(--pad);
      border-radius:999px;
      background:linear-gradient(90deg,var(--accent-1), var(--accent-2));
      color:#04101a;
      font-weight:700;
      border:0;
      cursor:pointer;
      box-shadow:0 8px 30px rgba(0,0,0,0.45);
      transition:transform 160ms ease, filter 160ms;
      font-family:var(--mono);
    }
    .btn-fullscreen:active{transform:translateY(1px) scale(.997)}
    .btn-fullscreen:focus{outline:3px solid rgba(0,210,255,0.12)}

    /* When the theater container itself is fullscreen, hide overlay (requirement) */
    .theater:fullscreen .overlay,
    .theater:-webkit-full-screen .overlay { /* vendor prefix for WebKit */
      display:none !important;
      visibility:hidden !important;
      opacity:0 !important;
      pointer-events:none !important;
    }

    /* Tray / preview cards - bottom scrolling layout */
    .tray-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:8px 16px 28px;
      gap:12px;
    }
    .tray{
      width:min(1200px, 96vw);
      background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
      border-radius:12px;
      padding:14px;
      overflow-x:auto;
      overflow-y:hidden;
      display:flex;
      gap:12px;
      align-items:center;
      scroll-behavior:auto;
      -webkit-overflow-scrolling:touch;
      border:1px solid rgba(255,255,255,0.02);
    }

    /* hide default scrollbar but keep functionality */
    .tray::-webkit-scrollbar{height:8px}
    .tray::-webkit-scrollbar-thumb{background:linear-gradient(90deg,var(--accent-1),var(--accent-2)); border-radius:999px; opacity:.65}
    .tray::-webkit-scrollbar-track{background:transparent}

    .preview-card{
      min-width:200px;
      width:200px;
      height:120px;
      border-radius:10px;
      position:relative;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));
      overflow:hidden;
      flex:0 0 auto;
      cursor:pointer;
      transition:transform var(--transition), box-shadow var(--transition);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:10px;
      border:1px solid rgba(255,255,255,0.02);
    }
    .preview-card:focus{outline:3px solid rgba(0,210,255,0.07)}
    .preview-card:hover{transform:translateY(-6px); box-shadow:0 10px 30px rgba(0,0,0,0.45)}

    /* image + placeholder layering */
    .preview-media{
      position:absolute;
      inset:0;
      display:block;
      background:linear-gradient(180deg, rgba(0,0,0,0.15), transparent);
    }
    .preview-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:transform 500ms cubic-bezier(.2,.9,.3,1);
    }
    .preview-card:hover .preview-media img{ transform: scale(1.06) rotate(.4deg) }

    /* placeholder displayed when image is missing (image will have inline onerror display:none) */
    .placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      text-align:center;
      font-family:var(--mono);
      color:rgba(255,255,255,0.95);
      font-weight:700;
      letter-spacing:0.02em;
      font-size:0.9rem;
      background:
        conic-gradient(from 120deg at 10% 10%, rgba(0,210,255,0.08), rgba(0,102,204,0.06)),
        linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.26));
      -webkit-mask-image: linear-gradient(180deg, black 0%, black 90%, transparent 100%);
    }

    .preview-label{
      position:relative;
      z-index:3;
      font-weight:700;
      font-size:0.9rem;
      text-shadow:0 4px 12px rgba(0,0,0,0.6);
      background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      padding:2px 6px;
      border-radius:6px;
    }

    /* small responsive tweaks */
    @media (max-width:720px){
      header{padding:12px}
      .brand h1{font-size:0.98rem}
      .theater-wrap{gap:12px}
      .preview-card{min-width:160px;width:160px;height:96px}
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" aria-hidden="false">
      <div class="logo" aria-hidden="true">M</div>
      <div>
        <h1>Mathspace</h1>
        <p>Geometric Game Theater</p>
      </div>
    </div>

    <div class="controls" role="region" aria-label="Page controls">
      <div class="theme-toggle" title="Toggle theme">
        <div class="label">Theme</div>
        <label class="switch" aria-label="Toggle theme">
          <input id="theme-toggle" type="checkbox" />
          <span class="knob" aria-hidden="true"></span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <div class="theater-wrap">
      <div id="theater" class="theater" tabindex="0" aria-label="Game theater">
        <div class="screen" id="screen">
          <!-- 16:9 iframe theater -->
          <iframe id="game-frame" src="pacman.html" title="Mathspace Game Viewer" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe>

          <!-- Hover overlay controls (bottom anchored) -->
          <div class="overlay" id="overlay" aria-hidden="false">
            <div class="game-title" aria-live="polite">
              <div class="title-text" id="current-title">Pacman</div>
              <div class="subtitle" id="current-sub">Local Module</div>
            </div>
            <div>
              <button id="btn-fullscreen" class="btn-fullscreen" title="Go fullscreen (container)">
                GO FULLSCREEN
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Optional description or CTA -->
      <div style="width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <div style="color:var(--muted); font-size:0.92rem;">
          Hover the screen for controls • Click a card to load a game
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom tray with hard-coded previews -->
  <div class="tray-wrap" aria-hidden="false">
    <div class="tray" id="tray" role="list" aria-label="Game previews">
      <!-- preview cards injected by JS -->
    </div>
  </div>

  <script>
    /* ===========================
       Hard-coded local game collection
       (Requirement #6 & #7 - exact mapping)
       =========================== */
    const GAMES = [
      { title: "Pacman", file: "pacman.html", img: "images/pacman.jpg" },
      { title: "Call of Duty 4", file: "COD4.html", img: "images/COD4.jpg" },
      { title: "1942 Arcade", file: "1942.html", img: "images/1942.jpg" },
      { title: "Zelda 2", file: "Zelda2.html", img: "images/Zelda2.jpg" },
      { title: "Zelda: Link to Past", file: "Zeldalinktopast.html", img: "images/Zeldalinktopast.jpg" },
      { title: "Mortal Kombat", file: "mortalkombat.html", img: "images/mortalkombat.jpg" },
      { title: "Pokemon Emerald", file: "pokemonemerald.html", img: "images/pokemonemerald.jpg" },
      { title: "Smash Bros", file: "smashbros.html", img: "images/smashbros.jpg" },
      { title: "Street Fighter 2", file: "streetfighter2.html", img: "images/streetfighter2.jpg" },
      { title: "Super Mario World 2", file: "supermarioworld2.html", img: "images/supermarioworld2.jpg" },
      { title: "Tennis", file: "tennis.html", img: "images/tennis.jpg" },
      { title: "Tony Hawk 2", file: "tonyhawk2.html", img: "images/tonyhawk2.jpg" },
      { title: "Winter Olympics", file: "winterolympics.html", img: "images/winterolympics.jpg" },
      { title: "Other Stuff", file: "otherstuff.html", img: "images/otherstuff.jpg" }
    ];

    /* DOM references */
    const tray = document.getElementById('tray');
    const frame = document.getElementById('game-frame');
    const currentTitle = document.getElementById('current-title');
    const currentSub = document.getElementById('current-sub');
    const theater = document.getElementById('theater');
    const overlay = document.getElementById('overlay');
    const btnFs = document.getElementById('btn-fullscreen');

    /* Create preview cards (Requirement #8) */
    function makeCard(game){
      const card = document.createElement('button');
      card.className = 'preview-card';
      card.setAttribute('role','listitem');
      card.setAttribute('aria-label', `Load ${game.title}`);
      card.tabIndex = 0;
      // When clicking or pressing Enter, load game
      const activate = () => loadGame(game);
      card.addEventListener('click', activate);
      card.addEventListener('keydown', (ev) => {
        if(ev.key === 'Enter' || ev.key === ' '){ ev.preventDefault(); activate(); }
      });

      // media layer
      const media = document.createElement('div');
      media.className = 'preview-media';

      const img = document.createElement('img');
      img.src = game.img;
      img.alt = `${game.title} screenshot`;
      // on error hide the broken image so the placeholder shows instead
      img.setAttribute('onerror', "this.style.display='none'");
      media.appendChild(img);

      // placeholder (will be visible if img is hidden)
      const placeholder = document.createElement('div');
      placeholder.className = 'placeholder';
      placeholder.innerText = 'Math Module';

      // title label
      const label = document.createElement('div');
      label.className = 'preview-label';
      label.innerText = game.title;

      card.appendChild(media);
      card.appendChild(placeholder);
      card.appendChild(label);

      return card;
    }

    // populate tray
    (function populateTray(){
      for(const g of GAMES){
        const c = makeCard(g);
        tray.appendChild(c);
      }
    })();

    /* Load a game into the iframe and update UI */
    function loadGame(game){
      // Instant title update
      currentTitle.textContent = game.title;
      currentSub.textContent = game.file;
      // Load file (local path)
      frame.src = game.file;
      // show overlay briefly when changing (ensures users see the update)
      overlay.classList.add('show');
      setTimeout(()=> overlay.classList.remove('show'), 1500);
    }

    // Initial state already set to pacman.html in the iframe src; ensure title matches
    (function initCurrent(){
      const initial = GAMES.find(g => g.file === 'pacman.html') || GAMES[0];
      if(initial){
        currentTitle.textContent = initial.title;
        currentSub.textContent = initial.file;
      }
    })();

    /* Fullscreen behavior (Requirement #5) */
    btnFs.addEventListener('click', async () => {
      // we request fullscreen on the theater container so :fullscreen selector matches .theater
      try {
        if (!document.fullscreenElement) {
          if (theater.requestFullscreen) {
            await theater.requestFullscreen();
          } else if (theater.webkitRequestFullscreen) {
            await theater.webkitRequestFullscreen();
          } else {
            // fallback: request on the iframe
            await frame.requestFullscreen();
          }
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.warn('Fullscreen request failed:', err);
      }
    });

    // If the user presses 'f' while focused on theater, toggle fullscreen
    theater.addEventListener('keydown', (e) => {
      if(e.key === 'f' || e.key === 'F'){
        e.preventDefault();
        btnFs.click();
      }
    });

    // Hide overlay while fullscreened (CSS handles display via :fullscreen), but update aria-hidden for screen readers:
    document.addEventListener('fullscreenchange', () => {
      const fs = !!document.fullscreenElement;
      overlay.setAttribute('aria-hidden', fs ? 'true' : 'false');
    });

    /* Theme toggle (Requirement #2) */
    const themeToggle = document.getElementById('theme-toggle');
    // populate initial theme from localStorage or OS setting
    const preferred = localStorage.getItem('mathspace-theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', preferred);
    themeToggle.checked = (preferred === 'light');

    themeToggle.addEventListener('change', (e) => {
      const t = e.target.checked ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('mathspace-theme', t);
      // animate a subtle highlight on the brand to emphasize the theme switch
      const logo = document.querySelector('.logo');
      logo.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.06)' }, { transform: 'scale(1)' }], { duration: 360, easing: 'ease-out' });
    });

    /* Make overlay reveal when pointer is over theater (also show on focus) */
    theater.addEventListener('mouseenter', () => overlay.classList.add('show'));
    theater.addEventListener('mouseleave', () => overlay.classList.remove('show'));
    theater.addEventListener('focusin', () => overlay.classList.add('show'));
    theater.addEventListener('focusout', () => overlay.classList.remove('show'));

    /* Accessibility: ensure clickable preview cards are keyboard reachable */
    // Already using button elements for cards; ensure tray is scrollable and keyboard-friendly.

    /* Extra: Prevent accidental drag of iframe covering pointer experience */
    frame.addEventListener('load', () => {
      // nothing required here for offline local files, but keep a safety console note.
      // You could message the iframe or attach event listeners if same-origin.
      console.debug('Loaded', frame.src);
    });

    /* Optional: keyboard shortcuts for navigation (left/right to scroll tray) */
    document.addEventListener('keydown', (e) => {
      if(e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if(e.key === 'ArrowRight') tray.scrollBy({left: 220, behavior:'smooth'});
      if(e.key === 'ArrowLeft') tray.scrollBy({left: -220, behavior:'smooth'});
      if(e.key === 'Home') tray.scrollTo({left:0, behavior:'smooth'});
      if(e.key === 'End') tray.scrollTo({left: tray.scrollWidth, behavior:'smooth'});
    });
  </script>
</body>
</html>
