<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE DIRECTORY</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ffcc;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            letter-spacing: 2px;
        }
        
        /* Search Bar Styling */
        .search-box {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: #00ffcc;
        }

        h2 {
            color: #ff007f;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin-top: 40px;
            border-left: 4px solid #ff007f;
            padding-left: 10px;
            letter-spacing: 1px;
        }
        .recent-section h2 {
            color: #ffcc00;
            border-left-color: #ffcc00;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 15px 0;
        }
        li {
            background: #1e1e1e;
            margin: 10px 0;
            border-radius: 6px;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            border: 1px solid #2d2d2d;
        }
        li:hover {
            background: #252525;
            transform: translateX(5px);
            border-color: #00ffcc;
        }
        button {
            display: block;
            width: 100%;
            padding: 18px;
            background: none;
            border: none;
            color: #00ffcc;
            text-align: left;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase; 
            letter-spacing: 1px;
            cursor: pointer;
        }
        .no-recents {
            color: #666;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Arcade Directory</h1>
    
    <input type="text" id="search-input" class="search-box" placeholder="Search for a game..." onkeyup="filterGames()">

    <div class="recent-section" id="recent-section-wrapper">
        <h2>Recently Played</h2>
        <ul id="recent-list">
            <div class="no-recents" id="no-recents">No games played recently.</div>
        </ul>
    </div>

    <div class="console-section" id="nintendo-section-wrapper">
        <h2>Nintendo Games</h2>
        <ul id="nintendo-list"></ul>
    </div>

    <div class="console-section" id="playstation-section-wrapper">
        <h2>Playstation Games</h2>
        <ul id="playstation-list"></ul>
    </div>
</div>

<script>
    const targetUser = 'CalcSolver';
    const targetRepo = 'Wii';
    const targetBranch = 'main';
    const githackBaseUrl = `https://raw.githack.com/${targetUser}/${targetRepo}/${targetBranch}/`;

    const nintendoGames = [
        "Zelda2.html", "smashbros.html", "tennis.html", "pacman.html",
        "supermarioworld2.html", "Zeldalinktopast.html", "pokemonemerald.html"
    ];

    const playstationGames = [
        "1942.html", "mortalkombat.html", "winterolympics.html",
        "tonyhawk2.html", "streetfighter2.html"
    ];

    nintendoGames.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
    playstationGames.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

    function launchGame(fileName) {
        const gameUrl = githackBaseUrl + fileName;
        addToRecents(fileName);

        const win = window.open('about:blank', '_blank');
        if (!win) {
            alert('Pop-up blocked! Please allow pop-ups to run games.');
            return;
        }

        win.document.body.style.margin = '0';
        win.document.body.style.height = '100vh';
        win.document.body.style.overflow = 'hidden';
        win.document.body.style.backgroundColor = '#000000';

        const iframe = win.document.createElement('iframe');
        iframe.style.border = 'none';
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.margin = '0';
        iframe.src = gameUrl;

        win.document.body.appendChild(iframe);
    }

    function createListElement(file) {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        
        const displayName = file.replace('.html', '').toUpperCase();
        btn.textContent = displayName;
        btn.onclick = () => launchGame(file);
        
        li.appendChild(btn);
        return li;
    }

    // Live filtering functionality
    function filterGames() {
        const query = document.getElementById('search-input').value.toUpperCase();
        
        // Filter Nintendo list items
        const nintendoItems = document.getElementById('nintendo-list').getElementsByTagName('li');
        for (let i = 0; i < nintendoItems.length; i++) {
            const btnText = nintendoItems[i].getElementsByTagName('button')[0].textContent;
            nintendoItems[i].style.display = btnText.includes(query) ? "" : "none";
        }

        // Filter PlayStation list items
        const psItems = document.getElementById('playstation-list').getElementsByTagName('li');
        for (let i = 0; i < psItems.length; i++) {
            const btnText = psItems[i].getElementsByTagName('button')[0].textContent;
            psItems[i].style.display = btnText.includes(query) ? "" : "none";
        }
    }

    function addToRecents(file) {
        let recents = JSON.parse(localStorage.getItem('recentGames')) || [];
        recents = recents.filter(item => item !== file);
        recents.unshift(file);
        if (recents.length > 3) recents.pop();
        
        localStorage.setItem('recentGames', JSON.stringify(recents));
        renderRecents();
    }

    function renderRecents() {
        const recentList = document.getElementById('recent-list');
        const noRecents = document.getElementById('no-recents');
        const recents = JSON.parse(localStorage.getItem('recentGames')) || [];

        recentList.innerHTML = '';

        if (recents.length === 0) {
            recentList.appendChild(noRecents);
            noRecents.style.display = 'block';
            return;
        }

        recents.forEach(file => {
            const element = createListElement(file);
            recentList.appendChild(element);
        });
    }

    const nintendoContainer = document.getElementById('nintendo-list');
    nintendoGames.forEach(file => nintendoContainer.appendChild(createListElement(file)));

    const playstationContainer = document.getElementById('playstation-list');
    playstationGames.forEach(file => playstationContainer.appendChild(createListElement(file)));

    renderRecents();
</script>

</body>
</html>
