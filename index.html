<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Games Directory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ffcc;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            letter-spacing: 2px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }
        li {
            background: #1e1e1e;
            margin: 10px 0;
            border-radius: 6px;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            border: 1px solid #2d2d2d;
        }
        li:hover {
            background: #252525;
            transform: translateX(5px);
            border-color: #00ffcc;
        }
        a {
            display: block;
            padding: 18px;
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Wii Games Directory</h1>
    <ul id="file-list"></ul>
</div>

<script>
    // Your exact repository details
    const targetUser = 'CalcSolver';
    const targetRepo = 'Wii';
    const targetBranch = 'main';

    // The base GitHack URL for your raw files
    const githackBaseUrl = `https://raw.githack.com/${targetUser}/${targetRepo}/${targetBranch}/`;

    // Your exact list of game files
    const gameFiles = [
        "1942.html",
        "Zelda2.html",
        "mortalkombat.html",
        "pacman.html",
        "smashbros.html",
        "tennis.html",
        "winterolympics.html"
    ];

    // Sort them strictly alphabetically (handles numbers like 1942 first naturally)
    gameFiles.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

    const fileList = document.getElementById('file-list');

    // Generate the links cleanly
    gameFiles.forEach(file => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        
        // Point directly to the production-ready GitHack raw URL
        a.href = githackBaseUrl + file;
        
        // Strip the ".html" extension and put the name in ALL CAPS for the menu display
        const displayName = file.replace('.html', '').toUpperCase();
        a.textContent = displayName;
        
        // Opens the game in a new tab when clicked
        a.target = "_blank"; 
        
        li.appendChild(a);
        fileList.appendChild(li);
    });
</script>

</body>
</html>
