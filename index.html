<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGS Files Directory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ffcc;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 50px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #1e1e1e;
            margin: 8px 0;
            border-radius: 6px;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid #2d2d2d;
        }
        li:hover {
            background: #252525;
            transform: translateX(5px);
            border-color: #00ffcc;
        }
        a {
            display: block;
            padding: 15px;
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>UGS Files Directory</h1>
    <div id="loading">Scraping repo and sorting files...</div>
    <ul id="file-list"></ul>
</div>

<script>
    // Target third-party repository details
    const targetUser = 'brickyosu';
    const targetRepo = 'ugs-files-sorted';
    const targetBranch = 'main';

    // Using an open proxy to read the HTML directory of the external repository safely
    const proxyUrl = 'https://api.allorigins.win/get?url=';
    const targetHtmlUrl = encodeURIComponent(`https://github.com/${targetUser}/${targetRepo}/tree/${targetBranch}`);
    const githackBaseUrl = `https://raw.githack.com/${targetUser}/${targetRepo}/${targetBranch}/`;

    async function loadExternalFiles() {
        try {
            const response = await fetch(`${proxyUrl}${targetHtmlUrl}`);
            if (!response.ok) throw new Error('Proxy failed to fetch data');
            
            const data = await response.json();
            
            // Parse the scraped HTML text from the target repository page
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            
            // Extract file link elements using GitHub's default layout classes
            const links = doc.querySelectorAll('a.Link--primary, .react-directory-row a');
            let fileNames = [];

            links.forEach(link => {
                const href = link.getAttribute('href') || '';
                // Filter out folders, readme pointers, or parent directories
                if (href.includes(`/blob/${targetBranch}/`)) {
                    const filename = href.split('/').pop();
                    if (filename && !fileNames.includes(filename)) {
                        fileNames.push(decodeURIComponent(filename));
                    }
                }
            });

            // Sort them strictly alphabetically
            fileNames.sort((a, b) => a.localeCompare(b.name, undefined, {sensitivity: 'base'}));

            const loadingDiv = document.getElementById('loading');
            const fileList = document.getElementById('file-list');
            loadingDiv.style.display = 'none';

            if (fileNames.length === 0) {
                loadingDiv.innerText = "No readable files found in that branch layout.";
                loadingDiv.style.display = "block";
                return;
            }

            // Render the items as All-Caps GitHack links
            fileNames.forEach(name => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                
                // Routes through GitHack CDN
                a.href = githackBaseUrl + name;
                a.textContent = name.toUpperCase();
                a.target = "_blank"; 
                
                li.appendChild(a);
                fileList.appendChild(li);
            });

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "Error loading index. The repository structure might have changed.";
        }
    }

    loadExternalFiles();
</script>

</body>
</html>
