<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Web Arcade Hub</title>
    <style>
        /* CSS Variables for Clean Theme Swapping */
        :root {
            --bg-color: #0b0c10;
            --text-color: #ffffff;
            --header-bg: #1f2833;
            --accent-color: #45f3ff;
            --card-gradient-start: #1f2833;
            --card-gradient-end: #0b0c10;
            --radial-gradient-start: #1f2833;
            --tray-border: #111111;
        }

        [data-theme="light"] {
            --bg-color: #f4f6f9;
            --text-color: #1a1a24;
            --header-bg: #ffffff;
            --accent-color: #0070f3;
            --card-gradient-start: #ffffff;
            --card-gradient-end: #e2e8f0;
            --radial-gradient-start: #e2e8f0;
            --tray-border: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        header {
            background-color: var(--header-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
        }

        .right-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-switch {
            background-color: var(--bg-color);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn {
            background-color: var(--bg-color);
            color: var(--accent-color);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
        }

        .workspace {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, var(--radial-gradient-start) 0%, var(--bg-color) 100%);
        }

        .theater-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            border: 3px solid var(--header-bg);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        .hover-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theater-box:hover .hover-controls {
            opacity: 1;
        }

        /* Hides both the overlay, title, and button in full-screen */
        .theater-box:fullscreen .hover-controls {
            display: none !important;
            opacity: 0 !important;
        }

        .current-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .fs-btn {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .deck-shelf {
            width: 100%;
            background-color: var(--header-bg);
            padding: 30px 20px;
            border-top: 2px solid var(--tray-border);
            margin-top: auto;
        }

        .deck-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 15px;
        }

        .deck-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .deck-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .deck-scroll::-webkit-scrollbar-track {
            background: var(--bg-color);
            border-radius: 4px;
        }

        .deck-scroll::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        .preview-card {
            flex: 0 0 160px;
            height: 115px;
            background: linear-gradient(135deg, var(--card-gradient-start) 0%, var(--card-gradient-end) 100%);
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .preview-card:hover {
            transform: translateY(-4px);
        }

        .preview-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card-fallback-emoji {
            font-size: 28px;
            z-index: 1;
        }

        .card-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            font-size: 11px;
            text-align: center;
            padding: 6px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">WII ARCADE</a>
        <div class="right-menu">
            <button class="theme-switch" onclick="toggleTheme()">☀️ LIGHT MODE</button>
            <a href="https://github.com" target="_blank" class="nav-btn">GitHub Repo</a>
        </div>
    </header>

    <main class="workspace">
        <div class="theater-box" id="mainTheater">
            <!-- Safe startup preview to bypass cross-recursion crashes -->
            <iframe id="viewport" src="pacman.html" allowfullscreen></iframe>
            <div class="hover-controls">
                <div class="current-title" id="displayTitle">Pacman</div>
                <button class="fs-btn" onclick="goFullscreen()">GO FULLSCREEN</button>
            </div>
        </div>
    </main>

    <section class="deck-shelf">
        <h2 class="deck-title">Select a Game Preview Below</h2>
        <div class="deck-scroll" id="cardGrid">Loading items dynamically...</div>
    </section>

    <script>
        const grid = document.getElementById('cardGrid');
        const view = document.getElementById('viewport');
        const titleText = document.getElementById('displayTitle');

        function formatGameTitle(filename) {
            let name = filename.replace('.html', '');
            if(name.toLowerCase() === 'cod4') return 'Call of Duty 4';
            if(name.toLowerCase() === 'zeldalinktopast') return 'Zelda: Link to Past';
            if(name.toLowerCase() === 'supermarioworld2') return 'Super Mario World 2';
            return name.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase()).trim();
        }

        // Automated GitHub scan engine loop
        async function fetchRepositoryGames() {
            try {
                const response = await fetch('https://github.com');
                const files = await response.json();
                
                const htmlFiles = files.filter(item => 
                    item.type === 'file' && 
                    item.name.endsWith('.html') && 
                    item.name !== 'index.html'
                );

                if (htmlFiles.length === 0) {
                    grid.innerHTML = "<div style='padding:10px;'>No game files found.</div>";
                    return;
                }

                grid.innerHTML = ""; 

                htmlFiles.forEach(file => {
                    const cleanTitle = formatGameTitle(file.name);
                    const rawBaseName = file.name.replace('.html', '');
                    
                    // Direct dynamic image mapper path matching your code structure
                    const anticipatedImg = `images/${rawBaseName}.jpg`;
                    const defaultEmojis = ["🕹️", "🎮", "⚔️", "👾", "🚀", "🏁", "🎯"];
                    const randomEmoji = defaultEmojis[Math.floor(Math.random() * defaultEmojis.length)];

                    const card = document.createElement('div');
                    card.className = 'preview-card';
                    card.innerHTML = `
                        <img src="${anticipatedImg}" alt="${cleanTitle}" onerror="this.style.display='none'">
