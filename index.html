<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE DIRECTORY</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        h1 {
            margin: 0;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-btn {
            background: #ff007f;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .form-btn:hover {
            background: #ff0055;
        }
        .search-box {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }
        .search-box:focus {
            border-color: #00ffcc;
        }
        h2 {
            color: #ff007f;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin-top: 40px;
            border-left: 4px solid #ff007f;
            padding-left: 10px;
        }
        .recent-section h2 { color: #ffcc00; border-left-color: #ffcc00; }
        .favorite-section h2 { color: #00ffcc; border-left-color: #00ffcc; }
        
        ul { list-style: none; padding: 0; margin: 15px 0; }
        li {
            background: #1e1e1e;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }
        li:hover { border-color: #00ffcc; }
        
        .game-btn {
            flex-grow: 1;
            padding: 18px;
            background: none;
            border: none;
            color: #fff;
            text-align: left;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase; 
            cursor: pointer;
        }
        .star-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 1.5rem;
            padding: 0 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-btn.fav-active {
            color: #ffcc00;
        }
        .no-items { color: #666; font-style: italic; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1>Arcade Hub</h1>
        <a href="" target="_blank" class="form-btn">Request / Upload Game</a>
    </div>
    
    <input type="text" id="search-input" class="search-box" placeholder="Search games..." onkeyup="filterGames()">

    <div class="favorite-section">
        <h2>My Favorites</h2>
        <ul id="favorites-list">
            <div class="no-items" id="no-favorites">Star a game to add it to your favorites!</div>
        </ul>
    </div>

    <div class="recent-section">
        <h2>Recently Played</h2>
        <ul id="recent-list">
            <div class="no-items" id="no-recents">No games played recently.</div>
        </ul>
    </div>

    <div class="console-section">
        <h2>Nintendo Games</h2>
        <ul id="nintendo-list"></ul>
    </div>

    <div class="console-section">
        <h2>Playstation Games</h2>
        <ul id="playstation-list"></ul>
    </div>
</div>

<script>
    const targetUser = 'CalcSolver';
    const targetRepo = 'Wii';
    const targetBranch = 'main';
    const githackBaseUrl = `https://raw.githack.com/${targetUser}/${targetRepo}/${targetBranch}/`;

    const nintendoGames = [
        "Zelda2.html", "smashbros.html", "tennis.html", "pacman.html",
        "supermarioworld2.html", "Zeldalinktopast.html", "pokemonemerald.html"
    ];

    const playstationGames = [
        "1942.html", "mortalkombat.html", "winterolympics.html",
        "tonyhawk2.html", "streetfighter2.html"
    ];

    nintendoGames.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
    playstationGames.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

    function launchGame(fileName) {
        const gameUrl = githackBaseUrl + fileName;
        addToRecents(fileName);

        const win = window.open('about:blank', '_blank');
        if (!win) {
            alert('Pop-up blocked! Please allow pop-ups to run games.');
            return;
        }

        win.document.body.style.margin = '0';
        win.document.body.style.height = '100vh';
        win.document.body.style.overflow = 'hidden';
        win.document.body.style.backgroundColor = '#000000';

        const iframe = win.document.createElement('iframe');
        iframe.style.border = 'none';
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.margin = '0';
        iframe.src = gameUrl;

        win.document.body.appendChild(iframe);
    }

    // Creates UI elements containing both a clickable title and a toggle star
    function createGameRow(file) {
        const li = document.createElement('li');
        li.setAttribute('data-filename', file);
        
        const gameBtn = document.createElement('button');
        gameBtn.className = 'game-btn';
        gameBtn.textContent = file.replace('.html', '').toUpperCase();
        gameBtn.onclick = () => launchGame(file);
        
        const starBtn = document.createElement('button');
        starBtn.className = 'star-btn';
        starBtn.innerHTML = '★';
        
        let favs = JSON.parse(localStorage.getItem('favGames')) || [];
        if (favs.includes(file)) {
            starBtn.classList.add('fav-active');
        }
        
        starBtn.onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(file, starBtn);
        };
        
        li.appendChild(gameBtn);
        li.appendChild(starBtn);
        return li;
    }

    function toggleFavorite(file, starElement) {
        let favs = JSON.parse(localStorage.getItem('favGames')) || [];
        if (favs.includes(file)) {
            favs = favs.filter(item => item !== file);
            starElement.classList.remove('fav-active');
        } else {
            favs.push(file);
            starElement.classList.add('fav-active');
        }
        localStorage.setItem('favGames', JSON.stringify(favs));
        
        // Dynamic visual update across arrays
        renderFavorites();
        updateStarStates();
    }

    function updateStarStates() {
        let favs = JSON.parse(localStorage.getItem('favGames')) || [];
        document.querySelectorAll('li').forEach(li => {
            const file = li.getAttribute('data-filename');
            const star = li.querySelector('.star-btn');
            if (star && file) {
                if (favs.includes(file)) {
                    star.classList.add('fav-active');
                } else {
                    star.classList.remove('fav-active');
                }
            }
        });
    }

    function renderFavorites() {
        const favList = document.getElementById('favorites-list');
        const noFavs = document.getElementById('no-favorites');
        const favs = JSON.parse(localStorage.getItem('favGames')) || [];

        favList.innerHTML = '';
        if (favs.length === 0) {
            favList.appendChild(noFavs);
            noFavs.style.display = 'block';
            return;
        }
        favs.forEach(file => favList.appendChild(createGameRow(file)));
    }

    function addToRecents(file) {
        let recents = JSON.parse(localStorage.getItem('recentGames')) || [];
        recents = recents.filter(item => item !== file);
        recents.unshift(file);
        if (recents.length > 3) recents.pop();
        
        localStorage.setItem('recentGames', JSON.stringify(recents));
        renderRecents();
    }

    function renderRecents() {
        const recentList = document.getElementById('recent-list');
        const noRecents = document.getElementById('no-recents');
        const recents = JSON.parse(localStorage.getItem('recentGames')) || [];

        recentList.innerHTML = '';
        if (recents.length === 0) {
            recentList.appendChild(noRecents);
            noRecents.style.display = 'block';
            return;
        }
        recents.forEach(file => recentList.appendChild(createGameRow(file)));
    }

    function filterGames() {
        const query = document.getElementById('search-input').value.toUpperCase();
        document.querySelectorAll('.console-section li').forEach(li => {
            const txt = li.querySelector('.game-btn').textContent;
            li.style.display = txt.includes(query) ? "" : "none";
        });
    }

    // Initialize lists
    const nintendoContainer = document.getElementById('nintendo-list');
    nintendoGames.forEach(file => nintendoContainer.appendChild(createGameRow(file)));

    const playstationContainer = document.getElementById('playstation-list');
    playstationGames.forEach(file => playstationContainer.appendChild(createGameRow(file)));

    renderRecents();
    renderFavorites();
</script>

</body>
</html>
