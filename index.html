<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Web Arcade | CalcSolver</title>
    <style>
        /* Modern UI Reset & Dark Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0e15;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        header {
            background-color: #16192b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #252945;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00d2ff;
            text-decoration: none;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .gh-link {
            background-color: #24292e;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: 0.2s ease;
            border: 1px solid #3f4752;
        }

        .gh-link:hover {
            background-color: #333a42;
            box-shadow: 0 0 12px rgba(255,255,255,0.1);
        }

        /* Main Preview Layout Workspace */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1d36 0%, #0d0e15 100%);
        }

        /* Small Preview Theater Window Container */
        .preview-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border: 3px solid #2e3456;
            overflow: hidden;
        }

        /* Running Iframe Application Viewport */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* Hidden On-Hover Controls Overlay */
        .controls-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .preview-wrapper:hover .controls-bar {
            opacity: 1;
        }

        .game-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
        }

        .fullscreen-btn {
            background-color: #00d2ff;
            color: #0f111a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.1s ease, background-color 0.2s;
        }

        .fullscreen-btn:hover {
            background-color: #33e0ff;
            transform: scale(1.05);
        }

        /* Lower Level Horizontal Selection Tray */
        .games-tray {
            width: 100%;
            background-color: #121424;
            padding: 20px 30px;
            border-top: 2px solid #252945;
        }

        .tray-heading {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7983a3;
            margin-bottom: 15px;
        }

        .games-grid {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }

        /* Custom Horizontal Scrollbars */
        .games-grid::-webkit-scrollbar {
            height: 8px;
        }
        .games-grid::-webkit-scrollbar-track {
            background: #0d0e15;
            border-radius: 10px;
        }
        .games-grid::-webkit-scrollbar-thumb {
            background: #2e3456;
            border-radius: 10px;
        }
        .games-grid::-webkit-scrollbar-thumb:hover {
            background: #00d2ff;
        }

        /* Individual Interactive Selection Cards */
        .game-card {
            flex: 0 0 160px;
            height: 120px;
            background-color: #1d213a;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            border: 2px solid #2e3456;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00d2ff;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.25);
        }

        /* Fallback CSS Block Textures for Thumbnails */
        .card-art-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, #1d213a 0%, #292f52 100%);
        }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 14, 21, 0.9);
            padding: 8px;
            font-size: 12px;
            text-align: center;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
