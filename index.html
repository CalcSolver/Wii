<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Arcade Station</title>
    <style>
        /* Base Styling & Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        header {
            background-color: #1f2833;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #45f3ff;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.4);
        }

        .repo-btn {
            background-color: #0b0c10;
            color: #45f3ff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #45f3ff;
            transition: 0.2s ease;
        }

        .repo-btn:hover {
            background-color: #45f3ff;
            color: #0b0c10;
        }

        /* Theater Main Preview Area */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
        }

        .theater-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 3px solid #1f2833;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* Fullscreen Overlay Bar */
        .hover-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theater-box:hover .hover-controls {
            opacity: 1;
        }

        .current-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .fs-btn {
            background-color: #45f3ff;
            color: #0b0c10;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .fs-btn:hover {
            transform: scale(1.05);
            background-color: #fff;
        }

        /* Bottom Previews Deck */
        .deck-shelf {
            width: 100%;
            background-color: #1f2833;
            padding: 20px;
            border-top: 2px solid #111;
        }

        .deck-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5c6c7;
            margin-bottom: 12px;
        }

        .deck-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        /* Custom Scrollbar */
        .deck-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .deck-scroll::-webkit-scrollbar-track {
            background: #0b0c10;
        }
        .deck-scroll::-webkit-scrollbar-thumb {
            background: #45f3ff;
            border-radius: 10px;
        }

        /* Game Preview Cards */
        .preview-card {
            flex: 0 0 150px;
            height: 110px;
            background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%);
            border: 2px solid #45f3ff;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: 0.2s ease;
        }

        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(69, 243, 255, 0.3);
        }

        .card-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            font-size: 11px;
            text-align: center;
            padding: 6px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">WII ARCADE HUB</a>
        <a href="https://github.com" target="_blank" class="repo-btn">View Code Repository</a>
    </header>

    <main class="workspace">
        <div class="theater-box" id="mainTheater">
            <!-- This loads the core repository root build first -->
            <iframe id="viewport" src="index.html" allowfullscreen></iframe>
            
            <div class="hover-controls">
                <div class="current-title" id="displayTitle">Wii System Menu</div>
                <button class="fs-btn" onclick="goFullscreen()">GO FULLSCREEN</button>
            </div>
        </div>
    </main>

    <section class="deck-shelf">
        <h2 class="deck-title">Your Local Repository Game Files</h2>
        <div class="deck-scroll" id="cardGrid">
            <!-- Populated via script mapping -->
        </div>
    </section>

    <script>
        // Maps directly to the game modules and folders inside your CalcSolver/Wii structure
        const localGames = [
            { title: "Wii Home Menu", path: "index.html", graphic: "💿" },
            { title: "Mii Channel Mod", path: "mii/index.html", graphic: "👥" },
            { title: "Wii Sports Lite", path: "sports/index.html", graphic: "🎾" },
            { title: "Wii Play Arcade", path: "play/index.html", graphic: "🎯" },
            { title: "Retro Emulator", path: "retro/index.html", graphic: "🕹️" },
            { title: "Bonus Settings", path: "settings/index.html", graphic: "⚙️" }
        ];

        const grid = document.getElementById('cardGrid');
        const view = document.getElementById('viewport');
        const titleText = document.getElementById('displayTitle');

        // Dynamically build the shelf elements
        localGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'preview-card';
            card.innerHTML = `
                ${game.graphic}
                <div class="card-name">${game.title}</div>
            `;
            
            // Updates iframe source relative to your project file directories
            card.addEventListener('click', () => {
                view.src = game.path;
                titleText.textContent = game.title;
            });
            
            grid.appendChild(card);
        });

        // Hardware-accelerated Fullscreen Engine
        function goFullscreen() {
            const box = document.getElementById('mainTheater');
            if (!document.fullscreenElement) {
                box.requestFullscreen().catch(err => {
                    console.warn(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
