<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Web Arcade Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        header {
            background-color: #1f2833;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #45f3ff;
            text-decoration: none;
        }

        .nav-btn {
            background-color: #0b0c10;
            color: #45f3ff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #45f3ff;
        }

        .workspace {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
        }

        .theater-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            border: 3px solid #1f2833;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        .hover-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theater-box:hover .hover-controls {
            opacity: 1;
        }

        /* FIX: Completely hide the controls overlay when the container goes fullscreen */
        .theater-box:fullscreen .hover-controls {
            display: none !important;
            opacity: 0 !important;
        }

        .current-title {
            font-size: 18px;
            font-weight: 600;
        }

        .fs-btn {
            background-color: #45f3ff;
            color: #0b0c10;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .deck-shelf {
            width: 100%;
            background-color: #1f2833;
            padding: 30px 20px;
            border-top: 2px solid #111;
            margin-top: auto;
        }

        .deck-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5c6c7;
            margin-bottom: 15px;
        }

        .deck-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .deck-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .deck-scroll::-webkit-scrollbar-track {
            background: #0b0c10;
            border-radius: 4px;
        }

        .deck-scroll::-webkit-scrollbar-thumb {
            background: #45f3ff;
            border-radius: 4px;
        }

        .preview-card {
            flex: 0 0 160px;
            height: 115px;
            background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%);
            border: 2px solid #45f3ff;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s ease;
        }

        .preview-card:hover {
            transform: translateY(-4px);
        }

        .preview-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card-fallback-emoji {
            font-size: 28px;
            z-index: 1;
        }

        .card-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            font-size: 11px;
            text-align: center;
            padding: 6px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">WII ARCADE</a>
        <a href="https://github.com" target="_blank" class="nav-btn">GitHub Repo</a>
    </header>

    <main class="workspace">
        <div class="theater-box" id="mainTheater">
            <iframe id="viewport" src="pacman.html" allowfullscreen></iframe>
            <div class="hover-controls">
                <div class="current-title" id="displayTitle">Pacman</div>
                <button class="fs-btn" onclick="goFullscreen()">GO FULLSCREEN</button>
            </div>
        </div>
    </main>

    <section class="deck-shelf">
        <h2 class="deck-title">Select a Game Preview Below</h2>
        <div class="deck-scroll" id="cardGrid"></div>
    </section>

    <script>
        const repositoryGames = [
            { title: "Pacman", file: "pacman.html", emoji: "🕹️", imgUrl: "images/pacman.jpg" },
            { title: "Call of Duty 4", file: "COD4.html", emoji: "🔫", imgUrl: "images/cod4.jpg" },
            { title: "1942 Arcade", file: "1942.html", emoji: "🛩️", imgUrl: "images/1942.jpg" },
            { title: "Zelda 2", file: "Zelda2.html", emoji: "⚔️", imgUrl: "images/zelda2.jpg" },
            { title: "Zelda: Link to Past", file: "Zeldalinktopast.html", emoji: "🛡️", imgUrl: "images/linktopast.jpg" },
            { title: "Mortal Kombat", file: "mortalkombat.html", emoji: "🥋", imgUrl: "images/mortalkombat.jpg" },
            { title: "Pokemon Emerald", file: "pokemonemerald.html", emoji: "🐉", imgUrl: "images/pokemon.jpg" },
            { title: "Smash Bros", file: "smashbros.html", emoji: "💥", imgUrl: "images/smashbros.jpg" },
            { title: "Street Fighter 2", file: "streetfighter2.html", emoji: "🥊", imgUrl: "images/streetfighter2.jpg" },
            { title: "Super Mario World 2", file: "supermarioworld2.html", emoji: "🍄", imgUrl: "images/mario.jpg" },
            { title: "Tennis", file: "tennis.html", emoji: "🎾", imgUrl: "images/tennis.jpg" },
            { title: "Tony Hawk 2", file: "tonyhawk2.html", emoji: "🛹", imgUrl: "images/tonyhawk2.jpg" },
            { title: "Winter Olympics", file: "winterolympics.html", emoji: "🏂", imgUrl: "images/winterolympics.jpg" },
            { title: "Other Stuff", file: "otherstuff.html", emoji: "📦", imgUrl: "" }
        ];

        const grid = document.getElementById('cardGrid');
        const view = document.getElementById('viewport');
        const titleText = document.getElementById('displayTitle');

        repositoryGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'preview-card';
            
            card.innerHTML = `
                <img src="${game.imgUrl}" alt="${game.title}" onerror="this.style.display='none'">
                <div class="card-fallback-emoji">${game.emoji}</div>
                <div class="card-name">${game.title}</div>
            `;
            
            card.addEventListener('click', () => {
                view.src = game.file;
                titleText.textContent = game.title;
            });
            
            grid.appendChild(card);
        });

        function goFullscreen() {
            const box = document.getElementById('mainTheater');
            if (!document.fullscreenElement) {
                box.requestFullscreen().catch(err => {
                    console.warn(err.message);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
